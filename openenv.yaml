openenv_version: "0.1"

name: data-quality-env
version: "0.1.0"
description: >
  A real-world reinforcement learning environment where AI agents learn to clean
  messy tabular datasets. The agent applies data-transformation operations
  (deduplication, imputation, format normalisation, outlier clipping) to maximise
  a quality score. Three tasks span easy → medium → hard difficulty.

author: "Yarra Vivek"
license: "MIT"

tasks:
  - id: task1_easy
    name: "Customer Records Deduplication & Imputation"
    difficulty: easy
    max_steps: 10
    description: >
      Remove duplicate customer rows (keyed on name+email+city) and fill missing
      age and email values so the dataset is ready for downstream CRM use.

  - id: task2_medium
    name: "Sales Data Standardisation & Cleansing"
    difficulty: medium
    max_steps: 15
    description: >
      Fix four date-format variants → ISO 8601, normalise Indian phone numbers
      to +91-XXXXX-XXXXX, remove negative transaction amounts, and impute
      missing regional labels.

  - id: task3_hard
    name: "Healthcare Records Full Quality Pipeline"
    difficulty: hard
    max_steps: 25
    description: >
      Full pipeline: remove duplicate patient IDs, fill missing diagnoses and
      medications, standardise two date columns, clip physiologically impossible
      vitals (bp_systolic > 200, bp_diastolic > 130, glucose < 0 or > 500),
      and remove negative glucose readings.

observation_space:
  type: object
  properties:
    task_id:             {type: string}
    task_name:           {type: string}
    task_description:    {type: string}
    table:               {type: array, items: {type: object}}
    column_schema:       {type: object}
    quality_issues:      {type: array, items: {type: string}}
    quality_score:       {type: number, minimum: 0.0, maximum: 1.0}
    step_count:          {type: integer}
    max_steps:           {type: integer}
    available_operations: {type: array, items: {type: string}}

action_space:
  type: object
  properties:
    operation:
      type: string
      enum:
        - remove_duplicates
        - fill_missing
        - standardize_date
        - standardize_phone
        - remove_negative
        - clip_outliers
        - done
    column: {type: string, nullable: true}
    params: {type: object}

reward_range: [0.0, 1.0]
reward_description: >
  Dense reward signal: reward = (new_quality_score - old_quality_score) - 0.01 step_penalty.
  The quality score is a weighted combination of per-issue component scores,
  each in [0.0, 1.0]. This provides gradient signal throughout the episode,
  not just at termination.

tags:
  - data-cleaning
  - tabular
  - real-world
  - imputation
  - normalisation
  - healthcare
  - finance
