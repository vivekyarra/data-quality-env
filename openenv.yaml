spec_version: 1
name: data-quality-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

version: "1.0.0"
description: >
  A real-world reinforcement learning environment where AI agents learn to clean
  messy tabular datasets. The agent applies data-transformation operations
  such as deduplication, imputation, format normalization, and outlier clipping
  to maximize a quality score across three tasks.
author: "Yarra Vivek"
license: "MIT"

tasks:
  - id: task1_easy
    name: "Customer Records Deduplication & Imputation"
    difficulty: easy
    max_steps: 10
    description: >
      Remove duplicate customer rows keyed on name, email, and city, then fill
      missing age and email values.
  - id: task2_medium
    name: "Sales Data Standardization & Cleansing"
    difficulty: medium
    max_steps: 15
    description: >
      Standardize mixed date formats, normalize Indian phone numbers, remove
      negative transaction amounts, and fill missing region values.
  - id: task3_hard
    name: "Healthcare Records Full Quality Pipeline"
    difficulty: hard
    max_steps: 25
    description: >
      Remove duplicate patient IDs, fill missing diagnoses and medications,
      standardize dates, normalize emergency contact phone numbers, clip
      outliers, and remove negative glucose values.

observation_space:
  type: object
  properties:
    task_id: {type: string}
    task_name: {type: string}
    task_description: {type: string}
    table: {type: array, items: {type: object}}
    column_schema: {type: object}
    quality_issues: {type: array, items: {type: string}}
    quality_score: {type: number, minimum: 0.0, maximum: 1.0}
    step_count: {type: integer}
    max_steps: {type: integer}
    available_operations: {type: array, items: {type: string}}

action_space:
  type: object
  properties:
    operation:
      type: string
      enum:
        - remove_duplicates
        - fill_missing
        - standardize_date
        - standardize_phone
        - remove_negative
        - clip_outliers
        - done
    column: {type: string, nullable: true}
    params: {type: object}

reward_range: [-1.0, 1.0]
reward_description: >
  Dense reward signal: reward = (new_quality_score - old_quality_score) - 0.01.
  The quality score is a weighted combination of per-issue component scores in
  [0.0, 1.0].

tags:
  - data-cleaning
  - tabular
  - healthcare
  - finance
  - reinforcement-learning
